services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/portcast
      REDIS_URL: redis://redis:6379/0
      SNAPSHOT_INTERVAL_SECONDS: "5"
    ports:
      - "8080:8000"
    depends_on:
      - postgres
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m app.service.worker
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/portcast
      REDIS_URL: redis://redis:6379/0
      SNAPSHOT_INTERVAL_SECONDS: "5"
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: portcast
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    command: redis-server --appendonly yes --appendfsync everysec
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
